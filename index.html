                        { time: "11:30", title: "新世界百貨 Centum City", icon: "shopping-bag", transitA: "計程車: 15 分", transitB: "地鐵 2 號線 (約 18 分)", hours: "至 20:00", address: "Centum City", desc: "最後購物衝刺，B2 層潮牌必逛。" },
                        { time: "15:45", title: "回飯店取行李 (來回精算)", icon: "home", transitA: "計程車 20 分 (易塞)", transitB: "地鐵 2 號線 (準時)", hours: "共預留 50 分鐘", address: "回西面取件", desc: "算準時間回西面拿行李。搭地鐵較能準時。" },
                        { time: "16:45", title: "飯店 ➔ 金海機場", icon: "plane", transitA: "計程車直達: 45 分, ₩25,000", transitB: "地鐵 2 轉輕軌 (約 75 分)", hours: "19:50 航班", address: "金海機場", desc: "<b>注意</b> 建議 17:30 前抵達。祝旅程平安圓滿！✈️" }
                    ]
                }
            ];

            return (
                <div className="min-h-screen pb-10 px-4 animate-fade-in">
                    {/* Header */}
                    <header className="relative pt-12 pb-6 px-4 max-w-4xl mx-auto text-center">
                        <div className="absolute top-4 left-1/2 -translate-x-1/2 w-48 h-10 bg-amber-200/50 rotate-1 z-10 shadow-sm border-x-4 border-dashed border-amber-300"></div>
                        <div className="bg-white p-8 md:p-12 shadow-md border border-slate-200 rounded-sm relative z-0 transform -rotate-1 text-wrap">
                            <div className="flex justify-center items-center gap-2 mb-4 italic text-slate-300">
                                <Icon name="scissors" size={16} />
                                <div className="text-pink-600 font-black text-xs tracking-widest uppercase">My Busan Scrapbook</div>
                                <Icon name="paperclip" size={16} />
                            </div>
                            <h1 className="text-3xl md:text-6xl font-black text-slate-800 mb-4 tracking-tighter leading-tight">{travelInfo.title}</h1>
                            <div className="flex flex-wrap justify-center gap-4 text-slate-500 font-bold text-xs md:text-sm">
                                <span className="flex items-center gap-1.5 border-b-2 border-dashed border-sky-300 pb-1 px-2">
                                    <Icon name="calendar" size={16} /> {travelInfo.date}
                                </span>
                                <span className="flex items-center gap-1.5 border-b-2 border-dashed border-pink-300 pb-1 px-2">
                                    <Icon name="plane" size={16} /> {travelInfo.flights}
                                </span>
                            </div>
                        </div>
                    </header>

                    {/* Navigation */}
                    <nav className="sticky top-0 z-50 bg-[#fdfcf0]/90 backdrop-blur-md py-4 mb-8 border-b border-slate-100">
                        <div className="max-w-4xl mx-auto px-4 flex justify-center gap-1 md:gap-2">
                            {[
                                { id: 'itinerary', label: '行程手札', icon: 'map', color: 'bg-pink-400' },
                                { id: 'prep', label: '行前/出入境', icon: 'luggage', color: 'bg-sky-400' },
                                { id: 'tips', label: '旅遊秘籍', icon: 'lightbulb', color: 'bg-amber-400' }
                            ].map(tab => (
                                <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`flex items-center gap-2 px-4 md:px-5 py-2.5 rounded-sm text-xs font-black transition-all shadow-sm border ${activeTab === tab.id ? `${tab.color} text-white border-transparent scale-105 shadow-md` : 'bg-white text-slate-400 border-slate-200 hover:bg-slate-50'}`}>
                                    <Icon name={tab.icon} size={14} /> {tab.label}
                                </button>
                            ))}
                        </div>
                    </nav>

                    <main className="max-w-4xl mx-auto px-2 md:px-4 space-y-12 relative z-10">
                        {activeTab === 'itinerary' && (
                            <div className="animate-fade-in">
                                <div className="flex gap-2 overflow-x-auto pb-6 scrollbar-hide px-1 justify-start md:justify-center">
                                    {itinerary.map((item, idx) => (
                                        <button key={idx} onClick={() => setActiveDay(idx)} className={`px-6 py-2.5 rounded-sm whitespace-nowrap text-xs font-black transition-all duration-300 shadow-sm border ${activeDay === idx ? `${itinerary[idx].color} text-slate-700 border-slate-300 ring-2 ring-slate-200 ring-offset-2` : "bg-white text-slate-400 border-slate-100"}`}>{item.day}</button>
                                    ))}
                                </div>

                                <div className="bg-white rounded-sm shadow-xl border border-slate-200 p-6 md:p-10 relative overflow-hidden text-wrap">
                                    <div className="absolute left-[-18px] top-20 bottom-20 flex flex-col justify-between py-10 z-20 pointer-events-none hidden md:flex">
                                        {[1,2,3,4,5,6].map(r => <div key={r} className="binder-ring"></div>)}
                                    </div>

                                    <div className="relative mb-12 text-center md:text-left">
                                        <div className={`absolute top-[-30px] right-4 w-32 h-10 ${itinerary[activeDay]?.tape} -rotate-6 z-0 shadow-sm`}></div>
                                        <h2 className="text-3xl md:text-5xl font-black text-slate-800 mb-3 relative z-10 font-serif italic tracking-tighter leading-tight">{itinerary[activeDay]?.title}</h2>
                                        <div className="flex flex-col md:flex-row md:items-center gap-3 text-slate-400 font-bold text-sm">
                                            <div className="flex items-center gap-2">
                                                <span className="bg-slate-100 px-4 py-1 rounded-sm text-xs font-black tracking-widest uppercase">{itinerary[activeDay]?.day} • {itinerary[activeDay]?.date}</span>
                                            </div>
                                            <div className="flex items-center gap-2 text-sky-500 italic">
                                                <Icon name={itinerary[activeDay]?.weatherIcon} size={16}/>
                                                <span>{itinerary[activeDay]?.weather}</span>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="space-y-12 relative pl-2 md:pl-10">
                                        <div className="absolute left-[38px] md:left-[54px] top-8 bottom-8 w-px bg-slate-100 border-l border-dashed border-slate-200"></div>
                                        {itinerary[activeDay]?.events?.map((event, idx) => (
                                            <div key={idx} className="flex gap-6 relative group">
                                                <div className="relative z-10 shrink-0">
                                                    <div className={`w-12 h-12 rounded-sm flex items-center justify-center bg-white border border-slate-200 shadow-sm transform transition-transform group-hover:rotate-12`}>
                                                        <Icon name={event.icon} className={itinerary[activeDay].accent} size={24} />
                                                    </div>
                                                    <div className="mt-3 text-center"><span className="text-[10px] font-black text-slate-400 block leading-tight tracking-tighter">{event.time}</span></div>
                                                </div>

                                                <div className="flex-1">
                                                    <div className="bg-slate-50/40 p-6 rounded-sm border border-slate-100 hover:bg-white hover:shadow-lg transition-all transform hover:-translate-y-1 relative overflow-hidden">
                                                        <div className="flex items-center flex-wrap gap-2 mb-3">
                                                            <h4 className="font-black text-slate-800 md:text-2xl leading-tight tracking-tight">{event.title}</h4>
                                                            {(event.title.includes('指定') || event.title.includes('報到') || event.title.includes('必')) && <span className="bg-rose-50 text-rose-500 text-[10px] px-2 py-0.5 rounded-sm border border-rose-100 font-black animate-pulse">MUST!</span>}
                                                        </div>
                                                        <p className="text-xs md:text-sm text-slate-500 leading-relaxed mb-5">{event.desc}</p>
                                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-3 mb-5 text-[11px]">
                                                            <div className="bg-white p-4 rounded-sm border-l-4 border-pink-300 shadow-sm relative">
                                                                <Icon name="car" size={24} className="absolute right-2 top-2 text-pink-50/50" />
                                                                <div className="font-black text-pink-500 mb-1">方案 A (快捷)</div>
                                                                <div className="text-slate-600 font-bold leading-snug">{event.transitA}</div>
                                                            </div>
                                                            <div className="bg-white p-4 rounded-sm border-l-4 border-sky-300 shadow-sm relative">
                                                                <Icon name="bus" size={24} className="absolute right-2 top-2 text-sky-50/50" />
                                                                <div className="font-black text-sky-600 mb-1">方案 B (大眾)</div>
                                                                <div className="text-slate-600 font-bold leading-snug">{event.transitB}</div>
                                                            </div>
                                                        </div>
                                                        <div className="space-y-1.5 bg-slate-200/20 p-4 border-l-2 border-slate-300 rounded-r-sm text-xs font-bold text-slate-500">
                                                            <div className="flex items-center gap-2 text-wrap"><Icon name="clock" size={14}/> {event.hours}</div>
                                                            <div className="flex items-start gap-2 text-wrap text-slate-400"><Icon name="map-pin" size={14} className="shrink-0 mt-0.5"/> {event.address}</div>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                    
                                    {itinerary[activeDay]?.alts && (
                                        <div className="mt-12 bg-white p-6 md:p-8 rounded-sm border-2 border-dashed border-sky-200 relative overflow-hidden">
                                            <div className="absolute top-[-10px] right-4 w-20 h-8 bg-sky-200/40 rotate-6"></div>
                                            <h3 className="text-xl font-black mb-8 flex items-center gap-2 text-sky-600 italic"><Icon name="utensils" size={24} /> 美食補給站 (備案推薦)</h3>
                                            <div className="grid grid-cols-1 gap-6">
                                                {itinerary[activeDay].alts.map((alt, i) => (
                                                    <div key={i} className="p-5 bg-sky-50/50 border border-sky-100 rounded-sm hover:bg-white transition-all group relative overflow-hidden text-wrap">
                                                        <div className="flex justify-between items-start mb-3 border-b border-sky-100 pb-2">
                                                            <h4 className="font-black text-slate-800 md:text-xl group-hover:text-sky-600 transition-colors">{alt.name}</h4>
                                                            <a href={alt.url} target="_blank"><Icon name="external-link" size={18} className="text-slate-300 hover:text-sky-400" /></a>
                                                        </div>
                                                        <p className="text-xs text-slate-500 leading-relaxed italic mb-4">"{alt.desc}"</p>
                                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-2 mb-4 text-[10px]">
                                                            <div className="bg-white/80 p-2 rounded-sm border border-sky-100"><b className="text-sky-500">A:</b> {alt.transitA}</div>
                                                            <div className="bg-white/80 p-2 rounded-sm border border-sky-100"><b className="text-sky-500">B:</b> {alt.transitB}</div>
                                                        </div>
                                                        <div className="flex flex-wrap gap-4 text-[10px] font-bold text-slate-400">
                                                            <div className="flex items-center gap-1.5"><Icon name="clock" size={12}/> {alt.hours}</div>
                                                            <div className="flex items-center gap-1.5 text-wrap"><Icon name="map-pin" size={12}/> {alt.address}</div>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    )}

                                    <div className="mt-16 bg-slate-800 rounded-sm p-8 text-white relative overflow-hidden shadow-2xl transform rotate-1 text-wrap">
                                        <div className="flex items-center gap-3 mb-6 relative z-10">
                                            <div className="bg-yellow-400 p-2 rounded-sm text-slate-900 shadow-lg"><Icon name="sticky-note" size={24}/></div>
                                            <h3 className="text-2xl font-black tracking-tight italic uppercase leading-none">Today's Notes</h3>
                                        </div>
                                        <ul className="grid grid-cols-1 md:grid-cols-2 gap-4 relative z-10">
                                            {itinerary[activeDay]?.precautions?.map((p, i) => (
                                                <li key={i} className="flex gap-3 text-sm text-slate-100 font-medium bg-white/5 p-4 rounded-sm border border-white/10">
                                                    <div className="bg-yellow-400 w-1.5 h-1.5 rounded-full mt-2 shrink-0 animate-pulse"></div>
                                                    {p}
                                                </li>
                                            ))}
                                        </ul>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'prep' && (
                            <div className="bg-white rounded-sm shadow-xl border border-slate-200 p-8 md:p-12 animate-fade-in relative overflow-hidden text-wrap">
                                <div className="absolute top-[-10px] left-10 w-40 h-8 bg-sky-200/50 -rotate-2 z-10 border-x-2 border-dashed border-sky-300"></div>
                                <h2 className="text-4xl font-black text-slate-800 mb-10 flex items-center gap-4 mt-4 font-serif italic text-wrap"><Icon name="luggage" size={40} className="text-sky-500" /> 行前清單 & 出入境</h2>
                                <div className="grid md:grid-cols-2 gap-12 text-wrap">
                                    <div className="space-y-6">
                                        <h3 className="font-black text-slate-400 text-xs tracking-widest uppercase border-b-2 border-slate-100 pb-2 flex items-center gap-2">快速過關申請 (必做)</h3>
                                        <div className="space-y-6">
                                            {travelInfo.entryGuides.map((guide, i) => (
                                                <div key={i} className="bg-slate-50 p-6 border-l-4 border-sky-400 rounded-sm shadow-sm text-wrap">
                                                    <h4 className="font-black text-slate-800 mb-3 text-lg leading-tight">{guide.title}</h4>
                                                    <ul className="space-y-2 mb-4">
                                                        {guide.steps.map((step, si) => (<li key={si} className="text-xs text-slate-600 flex gap-2"><Icon name="check-circle" size={14} className="text-sky-400 shrink-0" /> <span dangerouslySetInnerHTML={{ __html: step }}></span></li>))}
                                                    </ul>
                                                    <div className="text-[10px] text-amber-600 bg-amber-50 p-2 rounded-sm font-bold flex gap-2 italic"><Icon name="info" size={12} /> {guide.tip}</div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="space-y-6">
                                        <h3 className="font-black text-slate-400 text-xs tracking-widest uppercase border-b-2 border-slate-100 pb-2 flex items-center gap-2">行李物品準備</h3>
                                        <div className="space-y-3">
                                            {travelInfo.packingList.map((item, i) => (
                                                <div key={i} className="flex items-center justify-between bg-slate-50/50 p-4 rounded-sm border">
                                                    <div className="flex items-center gap-4">
                                                        <div className="w-5 h-5 border-2 border-sky-200 rounded-sm bg-white shadow-inner"></div>
                                                        <span className="text-sm font-bold text-slate-700">{item.item}</span>
                                                    </div>
                                                    <span className="text-[10px] px-2 py-0.5 bg-sky-100 text-sky-600 rounded-sm font-black uppercase tracking-tighter">{item.category}</span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'tips' && (
                            <div className="bg-white rounded-sm shadow-xl border border-slate-200 p-8 md:p-12 transform relative animate-fade-in text-wrap">
                                <div className="absolute top-[-10px] left-1/3 w-32 h-8 bg-amber-100/60 rotate-2 z-10 border-x-2 border-dashed border-amber-200 text-wrap text-wrap"></div>
                                <h2 className="text-4xl font-black text-slate-800 mb-12 flex items-center gap-4 mt-4 font-serif italic text-wrap"><Icon name="lightbulb" size={40} className="text-amber-500" /> 2026 韓國旅遊秘籍</h2>
                                <div className="space-y-8 text-wrap">
                                    <div className="bg-amber-50/50 p-8 rounded-sm border-2 border-dashed border-amber-200">
                                        <div className="grid gap-6 text-wrap">
                                            {travelInfo.koreaTips2026.map((tip, i) => (
                                                <div key={i} className="flex gap-4 items-start border-b border-amber-100 pb-6 last:border-0 last:pb-0 text-wrap">
                                                    <Icon name="sparkles" size={20} className="text-amber-500 shrink-0" />
                                                    <p className="text-sm md:text-lg font-bold text-slate-700 leading-relaxed text-wrap" dangerouslySetInnerHTML={{ __html: tip }}></p>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="bg-sky-50/50 p-8 rounded-sm border-2 border-dashed border-sky-200 relative overflow-hidden transform -rotate-1 shadow-inner text-wrap">
                                        <Icon name="wind" size={80} className="absolute -right-6 -bottom-6 text-sky-100 rotate-12 opacity-50" />
                                        <h3 className="font-black text-sky-600 mb-5 flex items-center gap-2 text-2xl tracking-tighter leading-none"><Icon name="wind" size={24}/> 三月釜山穿搭建議</h3>
                                        <p className="text-sm md:text-lg text-slate-600 leading-relaxed font-bold">
                                            釜山的春天雖美但海風強。三月氣溫雖回暖，但 "早晚溫差" 極大，經常低於 10 度。建議採用 <b>玉米式穿法</b>：保暖發熱衣 + 一般外衣 + 防風抗寒外套。圍巾與口罩是長途戶外行走（如甘川洞、海雲台步道）的好夥伴！
                                        </p>
                                    </div>
                                </div>
                            </div>
                        )}

                        <section className="bg-white rounded-sm p-8 md:p-12 shadow-lg border border-slate-200 relative mt-12 overflow-hidden text-wrap animate-fade-in">
                            <div className="absolute top-[-15px] left-10 w-24 h-8 bg-pink-100/50 -rotate-2 border-x border-pink-200"></div>
                            <h2 className="text-2xl md:text-3xl font-black tracking-tighter text-slate-800 italic uppercase border-b pb-6 flex items-center gap-3"><Icon name="book-open" size={24} className="text-pink-400" /> 達人推薦攻略</h2>
                            <div className="grid gap-5">
                                {travelInfo.blogLinks.map((link, idx) => (
                                    <a key={idx} href={link.url} target="_blank" rel="noopener noreferrer" className="group flex items-center justify-between p-6 rounded-sm bg-slate-50 hover:bg-white hover:border-pink-200 transition-all border border-transparent hover:shadow-xl transform hover:-rotate-1">
                                        <div className="flex items-center gap-5">
                                            <div className="bg-white p-3 rounded-sm shadow-sm text-pink-400 border border-slate-100 group-hover:scale-110 transition-transform">
                                                <Icon name="external-link" size={20} />
                                            </div>
                                            <div className="pr-4 text-wrap leading-tight">
                                                <h3 className="font-black text-slate-800 text-lg md:text-xl group-hover:text-pink-600 transition-colors">{link.name}</h3>
                                                <p className="text-xs text-slate-400 mt-1 italic font-medium leading-relaxed line-clamp-2">{link.desc}</p>
                                            </div>
                                        </div>
                                        <Icon name="chevron-right" className="text-slate-300 group-hover:text-pink-400" size={24} />
                                    </a>
                                ))}
                            </div>
                        </section>
                    </main>

                    <footer className="text-center py-16">
                        <div className="flex justify-center gap-4 text-pink-200 mb-6 animate-pulse"><Icon name="heart" size={20} fill="currentColor" /><Icon name="heart" size={20} fill="currentColor" /><Icon name="heart" size={20} fill="currentColor" /></div>
                        <p className="text-slate-300 font-black text-[11px] tracking-[0.4em] uppercase opacity-70">Prepared with Love for Busan Journey 2026 🇰🇷</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
